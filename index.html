<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Onco-RT · Formación Enfermería Radioterapia</title>
<meta name="description" content="App de formación y consulta para enfermería de radioterapia oncológica: protocolos, sistemas, farmacología, braquiterapia y más." />

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0B5E73" />
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Onco-RT" />

<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div id="app">

  <header class="app-header" id="app-header">
    <button class="back-btn" id="back-btn" hidden type="button" aria-label="Volver">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <svg class="header-mark iso-mark" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <circle class="bg" cx="14" cy="14" r="14"/>
      <circle class="ring r1" cx="14" cy="14" r="10.5"/>
      <circle class="ring r2" cx="14" cy="14" r="7.2"/>
      <circle class="ring r3" cx="14" cy="14" r="4.4"/>
      <circle class="core" cx="14" cy="14" r="1.4"/>
    </svg>
    <h1 id="header-title">Onco-RT</h1>
  </header>

  <main>
    <section class="screen" id="screen-home"></section>
    <section class="screen" id="screen-module" hidden></section>
    <section class="screen" id="screen-lesson" hidden></section>
    <section class="screen" id="screen-search" hidden></section>
  </main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <button class="nav-btn is-active" data-nav-target="home" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9h12v-9"/></svg>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" data-nav-target="modules" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.4"/><rect x="13" y="4" width="7" height="7" rx="1.4"/><rect x="4" y="13" width="7" height="7" rx="1.4"/><rect x="13" y="13" width="7" height="7" rx="1.4"/></svg>
      <span>Módulos</span>
    </button>
    <button class="nav-btn" data-nav-target="search" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.8" cy="10.8" r="6.3"/><path d="M20 20l-4.3-4.3"/></svg>
      <span>Buscar</span>
    </button>
  </nav>

</div>

<script src="js/content.js"></script>
<script src="js/app.js"></script>
</body>
</html>
